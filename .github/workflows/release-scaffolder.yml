<!-- template-exclude:start this workflow publishes the scaffolder from the template repo; scaffolded projects don't have a create/ package -->
name: Release scaffolder

on:
  push:
    branches: [main]

concurrency: release-scaffolder-${{ github.ref }}

permissions:
  id-token: write

jobs:
  release:
    name: Publish scaffolder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish create-react-native-library-template
        working-directory: create
        run: |
          local_version=$(node -p "require('./package.json').version")
          published_version=$(npm view create-react-native-library-template version 2>/dev/null || echo none)
          if [ "$local_version" = "$published_version" ]; then
            echo "create-react-native-library-template@$local_version is already on npm; skipping."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
<!-- template-exclude:end -->