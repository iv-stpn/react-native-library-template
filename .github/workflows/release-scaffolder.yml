<!-- template-exclude:start this workflow publishes the scaffolder from the template repo; scaffolded projects use release.yml -->
name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for pending changesets
        id: check
        run: |
          if [ -n "$(ls .changeset/*.md 2>/dev/null | grep -v README.md | head -1)" ]; then
            echo "has_changeset=true" >> $GITHUB_OUTPUT
          fi

      - name: Create release PR
        if: steps.check.outputs.has_changeset == 'true'
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish create-react-native-library-template
        if: steps.check.outputs.has_changeset != 'true'
        working-directory: create
        run: |
          local_version=$(node -p "require('./package.json').version")
          published_version=$(npm view create-react-native-library-template version 2>/dev/null || echo none)
          if [ "$local_version" = "$published_version" ]; then
            echo "create-react-native-library-template@$local_version is already on npm; skipping."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
<!-- template-exclude:end -->