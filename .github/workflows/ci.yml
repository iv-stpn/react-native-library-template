name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, typecheck, build, storybook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build library
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Storybook tests (vitest browser mode)
        run: bun run test:storybook

  # vitest-mobile E2E on a real iOS Simulator (follows the vitest-mobile docs'
  # iOS recipe). macOS runners are FREE on public repos; on PRIVATE repos
  # scaffolded from this template they bill at ~10x Linux minutes (~$0.08/min),
  # and every run is a ~5-min native build + simulator boot — gate/trim there.
  # Deviations from the docs (this is a bun monorepo, not a single app at root):
  #   - `bun install` replaces `npm ci` (there is no package-lock.json).
  #   - the RN app is `storybook/native`, so vitest-mobile runs from there.
  #   - `setup-node` stays: `vitest-mobile bootstrap` shells out to `npx` for
  #     `install-expo-modules`, so npm/npx must be on PATH.
  native-ios:
    name: Native tests (vitest-mobile, iOS Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The runner's default Ruby is 3.4, where `kconv` (needed by CocoaPods'
      # CFPropertyList when reading the Hermes XCFramework's binary plists) is a
      # bundled gem — unloadable under `bundle exec` unless the Gemfile declares
      # it. The harness Gemfile is generated by vitest-mobile, so pin Ruby 3.3
      # where kconv is still a default gem.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Metro resolves `@template/ui/*` through the package's `default` export
      # condition (`lib/module/...`), so the library must be built first.
      - name: Build library
        run: bun run build

      - name: Bootstrap harness (iOS)
        working-directory: storybook/native
        run: bunx vitest-mobile bootstrap --platform ios --headless

      # The RN CLI swallows the real pod-install error unless run with
      # --verbose (which vitest-mobile can't pass through), so on failure
      # dump the harness logs and re-run pod install verbosely.
      - name: Diagnose bootstrap failure (iOS)
        if: failure()
        run: |
          echo "==== vitest-mobile logs ===="
          cat ~/.cache/vitest-mobile/logs/*.log 2>/dev/null || true
          proj=$(ls -d ~/.cache/vitest-mobile/builds/*/project 2>/dev/null | head -1)
          if [ -n "$proj" ]; then
            echo "==== bundle exec pod install --verbose in $proj/ios ===="
            cd "$proj"
            bundle install || true
            cd ios
            bundle exec pod install --verbose || pod install --verbose || true
          fi

      - name: Pre-build JS bundle (iOS)
        working-directory: storybook/native
        run: bunx vitest-mobile bundle --platform ios

      - name: Run native tests (iOS)
        working-directory: storybook/native
        run: bunx vitest run --project ios

  # vitest-mobile E2E on a real Android Emulator (follows the docs' Android
  # recipe). Runs on free ubuntu runners but needs KVM + SDK 35 + Java 17.
  native-android:
    name: Native tests (vitest-mobile, Android Emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Enable KVM for a hardware-accelerated Android emulator.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Same as the iOS job: Metro needs the built `lib/` output to resolve
      # `@template/ui/*` exports.
      - name: Build library
        run: bun run build

      - name: Bootstrap harness (Android)
        working-directory: storybook/native
        run: bunx vitest-mobile bootstrap --platform android --headless --api-level 35

      - name: Pre-build JS bundle (Android)
        working-directory: storybook/native
        run: bunx vitest-mobile bundle --platform android

      - name: Run native tests (Android)
        working-directory: storybook/native
        run: bunx vitest run --project android

