name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    # The changesets action git-commits the version bump ("chore: version
    # packages") and publish tags. That commit would fire the husky pre-commit
    # hook, which runs the Playwright/Vitest browser story tests — but this
    # runner never installs Chromium (only the CI `checks` job does), so the
    # hook fails and takes the release with it. Skip hooks here: the `checks`
    # job already runs lint/typecheck/build/story tests on every push and PR.
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}