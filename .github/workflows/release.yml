name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `changeset publish` shells out to npm, which needs Node and registry auth.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # template-exclude:start — this step is stripped from scaffolded projects,
      # which do not contain the create/ scaffolder package.
      - name: Publish create-react-native-library-template
        working-directory: create
        run: |
          local_version=$(node -p "require('./package.json').version")
          published_version=$(npm view create-react-native-library-template version 2>/dev/null || echo none)
          if [ "$local_version" = "$published_version" ]; then
            echo "create-react-native-library-template@$local_version is already on npm; skipping."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # template-exclude:end
